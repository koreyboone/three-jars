<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Three Jars</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .emoji { font-size: 4rem; margin-bottom: 1rem; }
    h1 {
      color: #1e293b;
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }
    p {
      color: #64748b;
      font-size: 1rem;
      line-height: 1.5;
    }
    .banner {
      background: #fef3c7;
      color: #92400e;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.875rem;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">📡</div>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again. Your jar balances were last updated when you were online.</p>
    <div class="banner">⚠️ You're offline — some features may not be available</div>
  </div>
</body>
</html>
